# ============================================================================
# Supabase project config — Raji backend
# Source: RAJI-CONTEXT.md §D-15, MASTER-ARCHITECTURE.md §1
# Region locked to ap-south-1 (Mumbai) for DPDP alignment.
# ============================================================================

project_id = "raji"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

# ---------------------------------------------------------------------------
# Auth — Supabase Auth (JWT) with phone OTP + email.
# Expert-knowledge/05 §"User authentication" + D-15.
# ---------------------------------------------------------------------------
[auth]
enabled = true
site_url = "https://raji.app"
additional_redirect_urls = ["io.techinfinity.raji://auth-callback"]
jwt_expiry = 900                # 15 min access token
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 10
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
# Phone OTP is the primary signup path in India. Provider configured in
# Supabase dashboard (MSG91 is the common Indian choice).
enable_signup = true
enable_confirmations = true
template = "Raji login code: {{ .Code }}. Expires in 10 min. Never share with anyone."
max_frequency = "30s"

# ---------------------------------------------------------------------------
# Edge Functions
# ---------------------------------------------------------------------------
[functions.anthropic-proxy]
verify_jwt = true                # Supabase also checks JWT; our code re-verifies
import_map = "./functions/import_map.json"

[functions.sarvam-proxy]
verify_jwt = true
import_map = "./functions/import_map.json"

# ---------------------------------------------------------------------------
# Experimental / Realtime — on by default for cross-device sync later.
# ---------------------------------------------------------------------------
[realtime]
enabled = true

[analytics]
enabled = false
