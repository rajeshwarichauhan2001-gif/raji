# Raji — Android CI
#
# Builds Lite + Pro flavors on every PR + push to main when Android / shared paths change.
# Target: PR feedback <8 min via Gradle + build cache and path scoping.
#
# Required secrets (optional; gated — missing secrets only skip the internal-track upload):
#   PLAY_SERVICE_ACCOUNT_JSON   # base64 of Google Play service account JSON (for internal track upload)
#   UPLOAD_KEYSTORE_BASE64      # base64-encoded upload keystore (Play App Signing)
#   UPLOAD_KEYSTORE_PASSWORD    # keystore password
#   UPLOAD_KEY_ALIAS            # key alias
#   UPLOAD_KEY_PASSWORD         # key password
#
# See terminal-1-frameworks/ci-cd.md §4 (Android pipeline) and PERFORMANCE-BUDGET.md (size gates).

name: ci-android

on:
  pull_request:
    paths:
      - 'androidApp/**'
      - 'shared/**'
      - 'composeApp/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/ci-android.yml'
  push:
    branches: [main]
    paths:
      - 'androidApp/**'
      - 'shared/**'
      - 'composeApp/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/ci-android.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: build-${{ matrix.flavor }}-${{ matrix.build_type }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        flavor: [lite, pro]
        build_type: [debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for size-diff vs merge base

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          gradle-home-cache-cleanup: true

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Assemble ${{ matrix.flavor }} ${{ matrix.build_type }}
        env:
          FLAVOR: ${{ matrix.flavor }}
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          # Capitalize helper
          FLAVOR_CAP="$(echo "$FLAVOR" | sed 's/./\U&/')"
          BUILD_CAP="$(echo "$BUILD_TYPE" | sed 's/./\U&/')"
          ./gradlew :androidApp:assemble${FLAVOR_CAP}${BUILD_CAP} \
            --build-cache \
            --configuration-cache \
            --stacktrace

      - name: Unit tests — shared + androidApp (${{ matrix.flavor }})
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          FLAVOR_CAP="$(echo "$FLAVOR" | sed 's/./\U&/')"
          ./gradlew :shared:testDebugUnitTest :androidApp:test${FLAVOR_CAP}DebugUnitTest \
            --build-cache \
            --configuration-cache \
            --stacktrace

      - name: Android lint (${{ matrix.flavor }})
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          FLAVOR_CAP="$(echo "$FLAVOR" | sed 's/./\U&/')"
          ./gradlew :androidApp:lint${FLAVOR_CAP}Debug --build-cache --configuration-cache || true
        continue-on-error: true

      - name: Locate built APK
        id: apk
        run: |
          APK_PATH="$(find androidApp/build/outputs/apk -name '*.apk' | head -n 1 || true)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced; failing." >&2
            exit 1
          fi
          SIZE=$(stat -c%s "$APK_PATH")
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "APK: $APK_PATH ($SIZE bytes)"

      # PERFORMANCE-BUDGET.md: fail PR if APK delta > 500 KB vs merge-base.
      - name: APK size regression gate (>500KB)
        if: github.event_name == 'pull_request'
        env:
          FLAVOR: ${{ matrix.flavor }}
          BUILD_TYPE: ${{ matrix.build_type }}
          NEW_SIZE: ${{ steps.apk.outputs.size }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -e
          MAX_DELTA=$((500 * 1024))
          git fetch origin "$BASE_REF" --depth=1 || true
          BASE_SHA="$(git merge-base HEAD "origin/$BASE_REF" || echo '')"
          if [ -z "$BASE_SHA" ]; then
            echo "No merge-base; skipping size gate."
            exit 0
          fi
          # Build baseline in a temporary worktree
          WT=$(mktemp -d)
          git worktree add "$WT" "$BASE_SHA" >/dev/null
          FLAVOR_CAP="$(echo "$FLAVOR" | sed 's/./\U&/')"
          BUILD_CAP="$(echo "$BUILD_TYPE" | sed 's/./\U&/')"
          pushd "$WT" >/dev/null
          ./gradlew :androidApp:assemble${FLAVOR_CAP}${BUILD_CAP} --build-cache --configuration-cache -q || { echo "Baseline build failed; skipping size gate."; popd; git worktree remove "$WT" --force; exit 0; }
          BASE_APK="$(find androidApp/build/outputs/apk -name '*.apk' | head -n 1)"
          BASE_SIZE=$(stat -c%s "$BASE_APK" 2>/dev/null || echo 0)
          popd >/dev/null
          git worktree remove "$WT" --force
          echo "Base APK size: $BASE_SIZE, New APK size: $NEW_SIZE"
          DELTA=$((NEW_SIZE - BASE_SIZE))
          echo "Delta: $DELTA bytes (limit: $MAX_DELTA bytes)"
          if [ "$DELTA" -gt "$MAX_DELTA" ]; then
            echo "::error::APK size regression: ${DELTA} bytes (> ${MAX_DELTA} bytes / 500 KB). See PERFORMANCE-BUDGET.md."
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-${{ matrix.build_type }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.flavor }}-${{ matrix.build_type }}
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  # On push to main, upload the Lite release AAB to Play Store internal track.
  # Gated: skips if PLAY_SERVICE_ACCOUNT_JSON secret is not set.
  internal-track-upload:
    name: play-internal-track-upload (lite)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: play-internal
    steps:
      - name: Check gating secret
        id: gate
        env:
          HAS_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        run: echo "enabled=$HAS_SA" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up JDK 17
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: steps.gate.outputs.enabled == 'true'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: steps.gate.outputs.enabled == 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: Decode upload keystore
        if: steps.gate.outputs.enabled == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/signing/upload.jks"
          echo "UPLOAD_KEYSTORE_PATH=$RUNNER_TEMP/signing/upload.jks" >> "$GITHUB_ENV"

      - name: Build signed Lite AAB (release)
        if: steps.gate.outputs.enabled == 'true'
        env:
          UPLOAD_KEYSTORE_PATH: ${{ env.UPLOAD_KEYSTORE_PATH }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleLiteRelease --build-cache --configuration-cache --stacktrace

      - name: Upload to Play Store internal track
        if: steps.gate.outputs.enabled == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: io.techinfinity.raji.lite
          releaseFiles: androidApp/build/outputs/bundle/liteRelease/*.aab
          track: internal
          status: draft

      - name: Skip message (no secret)
        if: steps.gate.outputs.enabled != 'true'
        run: echo "PLAY_SERVICE_ACCOUNT_JSON not configured; skipping internal track upload."
