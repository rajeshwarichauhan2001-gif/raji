# Raji — Release
#
# Triggered on tags matching v*.  Fans out to all platforms in parallel, signs each artifact
# per-platform, generates changelog from git log, and publishes a GitHub Release.
#
# Required secrets (all gated — missing secrets produce unsigned stubs, not hard failures,
# so the pipeline keeps moving while infra is being provisioned):
#   UPLOAD_KEYSTORE_BASE64        # Android upload keystore (Play App Signing upload key)
#   UPLOAD_KEYSTORE_PASSWORD
#   UPLOAD_KEY_ALIAS
#   UPLOAD_KEY_PASSWORD
#   SIDELOAD_KEYSTORE_BASE64      # Android Pro sideload keystore
#   SIDELOAD_KEYSTORE_PASSWORD
#   SIDELOAD_KEY_ALIAS
#   SIDELOAD_KEY_PASSWORD
#   AZURE_KEY_VAULT_URI           # for Windows MSIX signing via AzureSignTool
#   AZURE_KEY_VAULT_CERT_NAME
#   AZURE_CLIENT_ID               # OIDC federated app for Azure
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#   GPG_PRIVATE_KEY               # ascii-armored private key for deb signing
#   GPG_PASSPHRASE
#   GPG_KEY_ID
#
# See terminal-1-frameworks/ci-cd.md §8 (Release engineering).

name: release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # releases are non-cancellable once started

permissions:
  contents: write
  id-token: write     # OIDC to Azure for MSIX signing
  packages: read

jobs:
  changelog:
    name: changelog
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      notes: ${{ steps.gen.outputs.notes }}
      version: ${{ steps.gen.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from git log
        id: gen
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo '')"
          if [ -z "$PREV_TAG" ]; then
            RANGE=""
            echo "No previous tag; including full history."
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            echo "Range: $RANGE"
          fi
          {
            echo "## Raji ${GITHUB_REF_NAME}"
            echo
            echo "**Released:** $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo
            echo "### Changes"
            echo
            if [ -n "$RANGE" ]; then
              git log --pretty=format:'- %s (%h)' "$RANGE"
            else
              git log --pretty=format:'- %s (%h)' -n 100
            fi
            echo
            echo
            echo "### Checksums"
            echo
            echo "See \`SHA256SUMS\` artifact attached to this release."
          } > release-notes.md
          {
            echo "version=$VERSION"
            echo 'notes<<EOF'
            cat release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 30

  build-android:
    name: build-android-${{ matrix.flavor }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flavor: [lite, pro]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode signing keystore (lite)
        if: matrix.flavor == 'lite' && env.HAS_KS == 'true'
        env:
          KS: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          HAS_KS: ${{ secrets.UPLOAD_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$KS" | base64 -d > "$RUNNER_TEMP/signing/upload.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/signing/upload.jks" >> "$GITHUB_ENV"
          echo "SIGNING_KEYSTORE_PASSWORD=${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=${{ secrets.UPLOAD_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=${{ secrets.UPLOAD_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Decode signing keystore (pro)
        if: matrix.flavor == 'pro' && env.HAS_KS == 'true'
        env:
          KS: ${{ secrets.SIDELOAD_KEYSTORE_BASE64 }}
          HAS_KS: ${{ secrets.SIDELOAD_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$KS" | base64 -d > "$RUNNER_TEMP/signing/sideload.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/signing/sideload.jks" >> "$GITHUB_ENV"
          echo "SIGNING_KEYSTORE_PASSWORD=${{ secrets.SIDELOAD_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=${{ secrets.SIDELOAD_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=${{ secrets.SIDELOAD_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build release artifacts
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          FLAVOR_CAP="$(echo "$FLAVOR" | sed 's/./\U&/')"
          if [ "$FLAVOR" = "lite" ]; then
            ./gradlew :androidApp:bundle${FLAVOR_CAP}Release :androidApp:assemble${FLAVOR_CAP}Release --build-cache --stacktrace
          else
            ./gradlew :androidApp:assemble${FLAVOR_CAP}Release --build-cache --stacktrace
          fi

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find androidApp/build/outputs -type f \( -name '*.aab' -o -name '*.apk' \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.flavor }}
          path: dist/*
          if-no-files-found: error

  build-windows:
    name: build-windows
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build MSI
        shell: pwsh
        continue-on-error: true   # stub if jpackage/WiX path not yet wired
        run: ./gradlew :desktopApp:packageMsi --build-cache --stacktrace

      - name: Azure login (OIDC) for signing
        if: env.HAS_AZ == 'true'
        env:
          HAS_AZ: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install AzureSignTool
        if: env.HAS_AZ == 'true'
        shell: pwsh
        env:
          HAS_AZ: ${{ secrets.AZURE_CLIENT_ID != '' }}
        run: dotnet tool install --global AzureSignTool

      - name: Sign MSI with Azure Key Vault
        if: env.HAS_AZ == 'true' && env.HAS_KV == 'true'
        shell: pwsh
        env:
          HAS_AZ: ${{ secrets.AZURE_CLIENT_ID != '' }}
          HAS_KV: ${{ secrets.AZURE_KEY_VAULT_URI != '' }}
          KV_URI: ${{ secrets.AZURE_KEY_VAULT_URI }}
          KV_CERT: ${{ secrets.AZURE_KEY_VAULT_CERT_NAME }}
        run: |
          $msi = Get-ChildItem -Path desktopApp/build/compose/binaries/main/msi -Filter *.msi -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            azuresigntool sign `
              --azure-key-vault-url "$env:KV_URI" `
              --azure-key-vault-certificate "$env:KV_CERT" `
              --azure-key-vault-managed-identity `
              --file-digest sha256 `
              --timestamp-rfc3161 http://timestamp.digicert.com `
              "$($msi.FullName)"
          } else {
            Write-Host "No MSI found; skipping signing."
          }

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          find desktopApp/build/compose/binaries/main -type f -name '*.msi' -exec cp {} dist/ \; 2>/dev/null || true
          ls -la dist/ || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*
          if-no-files-found: warn

  build-linux:
    name: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install packaging deps
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm binutils desktop-file-utils libfuse2 imagemagick dpkg-sig gnupg

      - name: Build DEB + distributable
        run: ./gradlew :desktopApp:packageDeb :desktopApp:createDistributable --build-cache --stacktrace

      - name: Build AppImage (stub)
        continue-on-error: true
        run: |
          curl -L -o appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          DIST_DIR="$(find desktopApp/build/compose/binaries/main/app -maxdepth 1 -mindepth 1 -type d | head -n 1 || true)"
          [ -z "$DIST_DIR" ] && { echo "No dist; skipping"; exit 0; }
          mkdir -p raji.AppDir && cp -R "$DIST_DIR/." raji.AppDir/
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/bin/Raji" "$@"\n' > raji.AppDir/AppRun
          chmod +x raji.AppDir/AppRun
          printf '[Desktop Entry]\nName=Raji\nExec=AppRun\nIcon=raji\nType=Application\nCategories=Utility;\n' > raji.AppDir/raji.desktop
          convert -size 256x256 xc:black raji.AppDir/raji.png || touch raji.AppDir/raji.png
          ./appimagetool.AppImage raji.AppDir Raji-x86_64.AppImage || echo "AppImage stub failed; continuing."

      - name: Import GPG and sign deb
        if: env.HAS_GPG == 'true'
        env:
          HAS_GPG: ${{ secrets.GPG_PRIVATE_KEY != '' }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          DEB="$(find desktopApp/build/compose/binaries/main/deb -name '*.deb' | head -n 1)"
          if [ -n "$DEB" ]; then
            echo "$GPG_PASSPHRASE" | dpkg-sig --gpg-options '--batch --pinentry-mode loopback' -k "$GPG_KEY_ID" --sign builder "$DEB"
          fi

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find desktopApp/build/compose/binaries/main -type f -name '*.deb' -exec cp {} dist/ \;
          [ -f Raji-x86_64.AppImage ] && cp Raji-x86_64.AppImage dist/
          ls -la dist/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*
          if-no-files-found: warn

  publish:
    name: publish-github-release
    needs: [changelog, build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + checksum
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.apk' -o -name '*.aab' -o -name '*.msi' -o -name '*.deb' -o -name '*.AppImage' \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Raji ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.notes }}
          files: |
            release/*
          draft: true   # human promotes to published after a sanity check
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
